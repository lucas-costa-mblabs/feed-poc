<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POC Template via JSON</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #f3f4f6;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      #app {
        width: 100%;
        max-width: 400px;
        padding: 20px;
      }

      /* Estilos base dos componentes Server-Driven UI */
      .card {
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        background-color: #ffffff;
        overflow: hidden;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      .row {
        display: flex;
        flex-direction: row;
      }

      .column {
        display: flex;
        flex-direction: column;
      }

      .divider {
        height: 1px;
        background-color: #e2e8f0;
        width: 100%;
      }

      .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 18px;
        color: #374151;
      }

      .icon-button {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 20px;
        color: #6b7280;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon-button:hover {
        color: #374151;
      }

      .cta {
        display: inline-block;
        text-align: center;
        padding: 12px 24px;
        border-radius: 24px;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        text-decoration: none;
        border: none;
      }

      .cta.primary {
        background-color: #6366f1; /* Cor primária do botão (roxa) */
        color: white;
      }

      .cta.primary:hover {
        background-color: #4f46e5;
      }

      img {
        max-width: 100%;
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script>
      // 1. O JSON que você tem no arquivo
      const templateJson = {
        id: "product_card_3700000341",
        type: "card",
        style: {
          borderRadius: "md",
          borderColor: "gray-200",
          backgroundColor: "white",
        },
        blocks: [
          {
            type: "row",
            alignItems: "center",
            padding: "md",
            blocks: [
              {
                type: "avatar",
                icon: "🛍️", // Emoji no lugar do ícone SVG para o POC
                backgroundColor: "gray-100",
              },
              {
                type: "text",
                value: "Shop Rock",
                fontWeight: "bold",
                marginLeft: "sm",
              },
            ],
          },
          { type: "divider" },
          {
            type: "image",
            url: "https://m.media-amazon.com/images/I/71Z+eM+b+-L._AC_SX679_.jpg", // Imagem de exemplo na web
            alt: "Cooktop Itatiaia Itamaster 4 Bocas",
            aspectRatio: "1:1",
            padding: "md",
          },
          { type: "divider" },
          {
            type: "column",
            padding: "md",
            gap: "md",
            blocks: [
              {
                type: "row",
                justifyContent: "space-between",
                blocks: [
                  {
                    type: "row",
                    gap: "md",
                    blocks: [
                      {
                        type: "icon_button",
                        icon: "♡",
                        action: "action:favorite",
                      },
                      {
                        type: "icon_button",
                        icon: "🔖",
                        action: "action:save",
                      },
                    ],
                  },
                  { type: "icon_button", icon: "🔗", action: "action:share" },
                ],
              },
              {
                type: "text",
                value:
                  "Cooktop Itatiaia Itamaster 4 Bocas Vidro Preto Bivolt 3700000341",
                fontSize: "sm",
                color: "gray-800",
              },
              {
                type: "text",
                value: "R$ 799,00",
                fontSize: "xl",
                fontWeight: "bold",
                color: "gray-900",
              },
              {
                type: "cta",
                label: "Ver detalhes",
                action: "deeplink:/produto/3700000341",
                style: "primary",
                fullWidth: true,
              },
            ],
          },
        ],
      };

      // 2. Engine "Server-Driven UI" simplificada
      // Constantes do Design System (Tokens)
      const spacingValues = {
        xs: "4px",
        sm: "8px",
        md: "16px",
        lg: "24px",
        xl: "32px",
        xxl: "48px",
      };

      const radiusValues = {
        sm: "4px",
        md: "8px",
        lg: "16px",
        full: "50%",
      };

      const colorValues = {
        white: "#ffffff",
        "gray-100": "#f3f4f6",
        "gray-200": "#e2e8f0",
        "gray-800": "#1f2937",
        "gray-900": "#111827",
        primary: "#6366f1",
      };

      const typographyValues = {
        xs: "12px",
        sm: "14px",
        md: "16px",
        lg: "18px",
        xl: "24px",
        xxl: "32px",
      };

      // Helper para converter tokens semânticos em valor real ("md" -> "16px")
      function getSpacing(value) {
        return spacingValues[value] || value; // Retorna o valor direto se não for token
      }

      function getRadius(value) {
        return radiusValues[value] || value;
      }

      function getColor(value) {
        return colorValues[value] || value;
      }

      function getTypography(value) {
        return typographyValues[value] || value;
      }

      // Essa função lê os blocos do JSON e cospe tags HTML equivalentes
      function renderBlock(block) {
        if (!block) return "";

        // Montando os estilos inline que vierem (ex: padding, gap, etc)
        const baseStyles = {};
        if (block.padding) baseStyles.padding = getSpacing(block.padding);
        if (block.gap) baseStyles.gap = getSpacing(block.gap);
        if (block.alignItems) baseStyles.alignItems = block.alignItems;
        if (block.justifyContent)
          baseStyles.justifyContent = block.justifyContent;
        if (block.marginLeft)
          baseStyles.marginLeft = getSpacing(block.marginLeft);

        const styleString = Object.entries(block.style || baseStyles)
          .map(([k, v]) => {
            let val = v;
            if (k.toLowerCase().includes("color")) val = getColor(v);
            if (k === "borderRadius") val = getRadius(v);
            return `${k.replace(/([A-Z])/g, "-$1").toLowerCase()}: ${val}`;
          })
          .join("; ");

        const getStyles = () => (styleString ? `style="${styleString}"` : "");

        // Componentes Base (Factory)
        switch (block.type) {
          case "card":
            return `<div class="card" ${getStyles()}>
            ${block.blocks.map(renderBlock).join("")}
          </div>`;

          case "row":
            return `<div class="row" ${getStyles()}>
            ${block.blocks.map(renderBlock).join("")}
          </div>`;

          case "column":
            return `<div class="column" ${getStyles()}>
            ${block.blocks.map(renderBlock).join("")}
          </div>`;

          case "text":
            const textStyles = {
              ...baseStyles,
              fontWeight: block.fontWeight || "normal",
              fontSize: getTypography(block.fontSize) || "inherit",
              color: getColor(block.color || "inherit"),
            };
            const textStyleStr = Object.entries(textStyles)
              .map(
                ([k, v]) =>
                  `${k.replace(/([A-Z])/g, "-$1").toLowerCase()}: ${v}`,
              )
              .join("; ");
            return `<span style="${textStyleStr}">${block.value}</span>`;

          case "avatar":
            const avatarStyles = {
              ...baseStyles,
              backgroundColor: getColor(block.backgroundColor),
            };
            const avatarStyleStr = Object.entries(avatarStyles)
              .map(
                ([k, v]) =>
                  `${k.replace(/([A-Z])/g, "-$1").toLowerCase()}: ${v}`,
              )
              .join("; ");
            return `<div class="avatar" style="${avatarStyleStr}">${block.icon}</div>`;

          case "image":
            return `<div ${getStyles()}><img src="${block.url}" alt="${block.alt}" style="width: 100%; object-fit: contain; aspect-ratio: ${block.aspectRatio.replace(":", "/")}"/></div>`;

          case "divider":
            return `<div class="divider"></div>`;

          case "icon_button":
            return `<button class="icon-button" onclick="alert('Disparar evento: ${block.action}')">${block.icon}</button>`;

          case "cta":
            const widthStr = block.fullWidth
              ? "width: 100%; box-sizing: border-box;"
              : "";
            return `<button class="cta ${block.style}" style="${widthStr}" onclick="alert('Redirecionar para: ${block.action}')">${block.label}</button>`;

          default:
            return "";
        }
      }

      // 3. Renderizando na tela
      document.getElementById("app").innerHTML = renderBlock(templateJson);
    </script>
  </body>
</html>
